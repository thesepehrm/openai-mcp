services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/data
      - outputs_data:/data/outputs
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      MASTER_ENC_KEY: ${MASTER_ENC_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      DB_PATH: /data/app.db
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
    restart: unless-stopped

volumes:
  sqlite_data:
  outputs_data:
